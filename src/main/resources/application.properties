spring.application.name=dignify

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dignify}}
spring.datasource.username=${DB_USERNAME:dignify}
spring.datasource.password=${DB_PASSWORD:dignify}
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.max-lifetime=600000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=2592000000

# APNs
apns.key-p8=${APNS_KEY_P8}
apns.key-id=${APNS_KEY_ID}
apns.team-id=${APNS_TEAM_ID}
apns.bundle-id=${APNS_BUNDLE_ID}

# Cron
cron.secret=${CRON_SECRET}
