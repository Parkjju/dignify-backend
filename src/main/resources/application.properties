spring.application.name=dignify

# DataSource
# Cloud Run: DB_URL=jdbc:postgresql:///dignify?cloudSqlInstance=PROJECT:REGION:INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory
# Local:     DB_URL 미설정 시 DB_HOST/PORT/NAME 기반 TCP 연결
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dignify}}
spring.datasource.username=${DB_USERNAME:dignify}
spring.datasource.password=${DB_PASSWORD:dignify}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=2592000000

# Cron
cron.secret=${CRON_SECRET}