services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dignify
      POSTGRES_USER: dignify
      POSTGRES_PASSWORD: dignify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dignify"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: dignify
      DB_USERNAME: dignify
      DB_PASSWORD: dignify
      JWT_SECRET: ${JWT_SECRET}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data: