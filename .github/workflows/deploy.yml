name: deploy

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: dignify-backend
  IMAGE: us-central1-docker.pkg.dev/dignify-501004/dignify/dignify-backend

jobs:
  test:
    runs-on: ubuntu-latest
    # 로컬 test/application.properties와 동일한 접속정보(dignify/dignify/dignify).
    # ddl-auto=create-drop이 스키마를 엔티티에서 생성하므로 별도 마이그레이션 불필요.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dignify
          POSTGRES_USER: dignify
          POSTGRES_PASSWORD: dignify
        ports: [5432:5432]
        options: >-
          --health-cmd "pg_isready -U dignify" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: ./gradlew test    # 실패하면 워크플로우 중단 → deploy job 미실행

  deploy:
    needs: test                # test 성공해야만 배포
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # WIF OIDC 토큰 발급에 필수
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: build & push
        run: |
          docker build --platform linux/amd64 -t "$IMAGE:$GITHUB_SHA" .
          docker push "$IMAGE:$GITHUB_SHA"

      - name: deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:$GITHUB_SHA" \
            --region "$REGION" \
            --min-instances 1
